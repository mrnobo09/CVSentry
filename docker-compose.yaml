
services:

  db:
    image: postgres:17
    container_name: postgres_db
    restart: always
    env_file:
      - ./core/.env        
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      retries: 5

  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: core_app
    ports:
      - "8000:8000"
    volumes:
      - ./core:/app          # sync local code with container
    env_file:
      - ./core/.env          # loads core-specific env vars
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
    user: "${UID:-1000}:${GID:-1000}"

volumes:
  postgres_data:

networks:
  default:
    name: core_network
