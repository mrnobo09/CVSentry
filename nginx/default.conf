server {
    listen 80;
    server_name localhost;

    # Maximum upload size for recordings/faces
    client_max_body_size 100M;

    # 1. API Root - Redirect or return 404 since no frontend is here
    location / {
        return 404;
    }

    # Certbot ACME Challenge (Proof of ownership)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 2. Django Backend (API & Admin)
    location ~ ^/(api|admin|auth|internal)/ {
        proxy_pass http://core:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. SRS (WebRTC WHIP/WHEP Signaling)
    location /rtc/ {
        proxy_pass http://srs:1985;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. MinIO (S3 Console & API)
    location /minio/ {
        proxy_pass http://minio:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
