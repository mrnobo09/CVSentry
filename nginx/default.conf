server {
    listen 80;
    server_name localhost;

    # Maximum upload size for recordings/faces
    client_max_body_size 100M;

    # 1. Frontend Dashboard (React/Vite)
    location / {
        proxy_pass http://dashboard:5173; # Change to static serving if built
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Django Backend (API & Admin)
    location ~ ^/(api|admin|auth|internal)/ {
        proxy_pass http://core:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. SRS (WebRTC WHIP/WHEP Signaling)
    location /rtc/ {
        proxy_pass http://srs:1985;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. MinIO (S3 Console & API)
    location /minio/ {
        proxy_pass http://minio:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
