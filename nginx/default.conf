server {
    listen 80;
    server_name localhost;

    # Maximum upload size for recordings/faces
    client_max_body_size 100M;

    # 1. SRS (WebRTC WHIP/WHEP Signaling) - Must be above the catch-all
    location /rtc/ {
        proxy_pass http://srs:1985;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. MinIO (S3 Console & API)
    location /minio/ {
        proxy_pass http://minio:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Certbot ACME Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 4. Catch-all: Send everything else to Django
    location / {
        proxy_pass http://core:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
