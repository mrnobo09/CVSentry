<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: 'Plus Jakarta Display', sans-serif;
            background-color: #0E091E;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, #0E091E 0%, #1a1f4d 100%);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .content {
            margin-bottom: 40px;
            text-align: center;
        }
        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 16px;
        }
        p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .button {
            display: inline-block;
            background-color: #0970F0;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #0758c0;
        }
        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">CVSentry</div>
        </div>
        <div class="content">
            <h1>Activate Your Account</h1>
            <p>Welcome to CVSentry! We're excited to have you on board. Please activate your account to get started.</p>
            <a href="{{ frontend_url }}/activate/{{ uid }}/{{ token }}" class="button">Activate Account</a>
            <p style="margin-top: 30px; font-size: 14px;">If you didn't create an account, you can safely ignore this email.</p>
        </div>
        <div class="footer">
            &copy; 2026 CVSentry. All rights reserved.<br>
            Team CVSentry
        </div>
    </div>
</body>
</html>
